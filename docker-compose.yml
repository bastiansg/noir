services:
    noir-core:
        image: noir-core
        container_name: noir-core
        build:
            context: .
            dockerfile: ./docker/core/Dockerfile
        volumes:
            - $PWD/resources:/resources
        env_file:
            - .env
        networks:
            - noir

    noir-app:
        image: noir-app
        container_name: noir-app
        build:
            context: .
            dockerfile: ./docker/app/Dockerfile
        volumes:
            - $PWD/resources:/resources
        env_file:
            - .env
        restart: unless-stopped
        networks:
            - noir

networks:
    noir:
        name: noir
        driver: bridge
